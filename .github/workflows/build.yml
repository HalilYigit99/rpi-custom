name: Pi5 Custom Image Build

"on":
  # Her Pazar 03:00 UTC — haftalık güncel paket garantisi
  schedule:
    - cron: '0 3 * * 0'
  # Elle tetikleme (Actions sekmesinden)
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profili'
        required: false
        default: 'both'
        type: choice
        options: [both, desktop, server]

# Aynı anda birden fazla workflow çalışmasın (scheduled + manual çakışması)
concurrency:
  group: pi5-build
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # Server profili (küçük, önce çalışır — disk: ~13GB peak)
  # -----------------------------------------------------------------------
  build-server:
    name: Build server image
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.profile == 'both' ||
      github.event.inputs.profile == 'server'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ortamı kurulumu
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            systemd-container libarchive-tools parted dosfstools e2fsprogs \
            xz-utils qemu-user-static binutils curl

      - name: aarch64 binfmt kaydı
        run: |
          sudo update-binfmts --enable qemu-aarch64
          ls /proc/sys/fs/binfmt_misc/qemu-aarch64

      - name: Cache — ALARM rootfs tarball
        uses: actions/cache@v4
        with:
          path: build/cache/ArchLinuxARM-aarch64-latest.tar.gz
          # Tarball URL sabit ama içerik değişiyor — haftanın numarasına göre rotate
          key: alarm-tarball-${{ github.run_id }}
          restore-keys: alarm-tarball-

      - name: Cache — Ollama tarball
        uses: actions/cache@v4
        with:
          path: build/cache/ollama-linux-arm64.tar.zst
          key: ollama-tarball-v1
          restore-keys: ollama-tarball-

      - name: Cache — pacman paketleri (server)
        uses: actions/cache@v4
        with:
          path: build/cache/pacman-pkg
          key: pacman-pkg-${{ hashFiles('scripts/chroot-common.sh') }}
          restore-keys: pacman-pkg-

      - name: Cache — Hailo kaynağı ve .ko
        uses: actions/cache@v4
        with:
          path: |
            build/cache/hailort-src-*.tar.gz
            build/cache/hailo-ko-*.tar.zst
          key: hailo-${{ env.HAILO_VERSION || '4.20.0' }}

      - name: Build (server)
        run: |
          mkdir -p build/cache output
          sudo XZ_LEVEL=3 HAILO_ENABLED=true bash scripts/build.sh server
        timeout-minutes: 120

      - name: Disk kullanımı raporu
        if: always()
        run: df -h && du -sh build/ output/ 2>/dev/null || true

      - name: Eski img temizliği (disk için)
        if: always()
        run: sudo rm -f build/server/archpi.img

      - name: Upload — server imajı
        uses: actions/upload-artifact@v4
        with:
          name: pi5-arch-server-${{ github.run_number }}
          path: output/pi5-arch-server-*.img.xz
          retention-days: 30
          if-no-files-found: error

      - name: Build log'u artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-server-${{ github.run_number }}
          path: output/build-server.log
          retention-days: 7
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Desktop profili (büyük, server bittikten sonra çalışır — disk: ~17GB peak)
  # -----------------------------------------------------------------------
  build-desktop:
    name: Build desktop image
    runs-on: ubuntu-latest
    needs: build-server   # Disk için sıralı çalış
    if: >-
      always() && (
        github.event_name == 'schedule' ||
        github.event.inputs.profile == 'both' ||
        github.event.inputs.profile == 'desktop'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ortamı kurulumu
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            systemd-container libarchive-tools parted dosfstools e2fsprogs \
            xz-utils qemu-user-static binutils curl

      - name: aarch64 binfmt kaydı
        run: |
          sudo update-binfmts --enable qemu-aarch64
          ls /proc/sys/fs/binfmt_misc/qemu-aarch64

      - name: Cache — ALARM rootfs tarball
        uses: actions/cache@v4
        with:
          path: build/cache/ArchLinuxARM-aarch64-latest.tar.gz
          key: alarm-tarball-${{ github.run_id }}
          restore-keys: alarm-tarball-

      - name: Cache — Ollama tarball
        uses: actions/cache@v4
        with:
          path: build/cache/ollama-linux-arm64.tar.zst
          key: ollama-tarball-v1
          restore-keys: ollama-tarball-

      - name: Cache — pacman paketleri (desktop — server cache'inden beslenebilir)
        uses: actions/cache@v4
        with:
          path: build/cache/pacman-pkg
          key: pacman-pkg-${{ hashFiles('scripts/chroot-common.sh') }}
          restore-keys: pacman-pkg-

      - name: Cache — Hailo kaynağı ve .ko
        uses: actions/cache@v4
        with:
          path: |
            build/cache/hailort-src-*.tar.gz
            build/cache/hailo-ko-*.tar.zst
          key: hailo-${{ env.HAILO_VERSION || '4.20.0' }}

      - name: Build (desktop)
        run: |
          mkdir -p build/cache output
          sudo XZ_LEVEL=3 HAILO_ENABLED=true bash scripts/build.sh desktop
        timeout-minutes: 180

      - name: Disk kullanımı raporu
        if: always()
        run: df -h && du -sh build/ output/ 2>/dev/null || true

      - name: Eski img temizliği (disk için)
        if: always()
        run: sudo rm -f build/desktop/archpi.img

      - name: Upload — desktop imajı
        uses: actions/upload-artifact@v4
        with:
          name: pi5-arch-desktop-${{ github.run_number }}
          path: output/pi5-arch-desktop-*.img.xz
          retention-days: 30
          if-no-files-found: error

      - name: Build log'u artifact olarak kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-desktop-${{ github.run_number }}
          path: output/build-desktop.log
          retention-days: 7
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # GitHub Release — her iki build başarılıysa tag'li release oluştur
  # -----------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-server, build-desktop]
    if: success()
    permissions:
      contents: write

    steps:
      - name: Tarihli tag hesapla
        id: tag
        run: echo "tag=build-$(date -u +%Y%m%d)-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Server imajını indir
        uses: actions/download-artifact@v4
        with:
          name: pi5-arch-server-${{ github.run_number }}
          path: release/

      - name: Desktop imajını indir
        uses: actions/download-artifact@v4
        with:
          name: pi5-arch-desktop-${{ github.run_number }}
          path: release/

      - name: GitHub Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Pi5 Arch Image — ${{ steps.tag.outputs.tag }}
          body: |
            ## Otomatik Build

            | | |
            |---|---|
            | **Kernel** | linux-rpi-16k (RPi Foundation fork) |
            | **Overclock** | 2.8GHz CPU / 900MHz GPU / +50mV |
            | **PCIe** | Gen 3 (Hailo AI HAT+ için) |
            | **Hailo** | hailort v4.20.0 (DKMS + user-space runtime) |
            | **Ollama** | Kurulu ama modelsiz (flashladıktan sonra `ollama pull gemma3:1b`) |

            ### Profiller
            - **desktop**: KDE Plasma + KRDP lazy-start + Hailo + Kamera
            - **server**: Headless + Ollama + SSH + Tailscale + Hailo + Kamera

            ### Flash
            ```bash
            xz -dc pi5-arch-desktop-*.img.xz | sudo dd of=/dev/sdX bs=4M status=progress conv=fsync
            ```

            ### İlk Boot
            BOOT partition'ına `pi-provision/` klasörü oluşturup `wifi-home.conf` ve `tailscale.conf` koyabilirsin.
          files: release/*.img.xz
          draft: false
          prerelease: false
